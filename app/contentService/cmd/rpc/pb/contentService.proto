syntax = "proto3";

option go_package = "./pb";

package pb;

// ========== 基础结构体 ==========
message Tweet {
  int64  snow_tid = 1;          // 推文ID（雪花算法）
  int64  uid = 2;          // 发布用户ID
  string content = 3;      // 推文内容
  repeated string media_urls = 4; // 图片链接
  repeated string tags = 5; // 标签
  bool is_public = 6;      // 是否公开
  int64  created_at = 7;   // 创建时间（毫秒时间戳）
  int64  like_count = 8;    // 点赞数
  int64  comment_count = 9; // 评论数
  int64  status = 10;       // 推文状态（0正常，1删除，2审核）

  // 以下字段不存储在数据库中，通过关联查询获取
  string nickname = 11;     // 发布用户昵称
  string avatar = 12;       // 发布用户头像
}

// ========== 用户主页推文列表查询（游标分页） ==========
message ListTweetsUidReq {
  int64  query_uid = 1;     // 要查询的用户ID
  bool  is_public = 2;      // 是否包含私密推文（true=包含，false=仅公开）
  int64  cursor = 3;        // 游标：上次最后一条的created_at，首次传0
  int64  limit = 4;          // 每页条数
  int64  sort = 5;          // 排序(0=DESC, 1=ASC)
}

message ListTweetsUidResp {
  int64  code = 1;
  string msg = 2;
  repeated Tweet tweets = 3;
  int64  total = 4;           // 总数（用于判断是否还有下一页）
}

// ========== 单条推文查询 ==========
message GetTweetBySnowTidReq {
  int64  snow_tid = 1;      // 推文ID（雪花算法）
}

message GetTweetBySnowTidResp {
  int64  code = 1;
  string msg = 2;
  Tweet tweet = 3;
}

// ========== 批量推文查询 ==========
message BatchGetTweetsReq {
  repeated int64  snow_tids = 1;  // 推文ID列表
}

message BatchGetTweetsResp {
  int64  code = 1;
  string msg = 2;
  repeated Tweet tweets = 3;
}

// ========== 创建推文 ==========
message CreateTweetReq {
  int64  uid = 1;
  string content = 2;
  repeated string media_urls = 3;
  repeated string tags = 4;
  bool  is_public = 5;
}

message CreateTweetResp {
  int64  code = 1;
  string msg = 2;
  Tweet tweet = 3;
}

// ========== 删除推文 ==========
message DeleteTweetReq {
  int64  snow_tid = 1;      // 推文ID（雪花算法）
  int64  uid = 2;          // 操作用户ID（用于权限校验）
}

message DeleteTweetResp {
  int64  code = 1;
  string msg = 2;
}

// ========== RPC 服务定义 ==========
service Content {
  // 用户主页推文列表（游标分页）
  rpc ListTweetsUid(ListTweetsUidReq) returns (ListTweetsUidResp);
  // 单条推文查询
  rpc GetTweetBySnowTid(GetTweetBySnowTidReq) returns (GetTweetBySnowTidResp);
  // 批量推文查询
  rpc BatchGetTweets(BatchGetTweetsReq) returns (BatchGetTweetsResp);
  // 创建推文
  rpc CreateTweet(CreateTweetReq) returns (CreateTweetResp);
  // 删除推文
  rpc DeleteTweet(DeleteTweetReq) returns (DeleteTweetResp);
  // 更新推文统计字段（like_count / comment_count）
  rpc UpdateTweetStats(UpdateTweetStatsReq) returns (UpdateTweetStatsResp);
}

// ========== 更新推文统计 ==========
message UpdateTweetStatsReq {
  int64  snow_tid = 1;
  int64  update_type = 2; // 1=like_count, 2=comment_count
  int64  delta = 3;
}

message UpdateTweetStatsResp {
  int64  code = 1;
  string msg = 2;
}
