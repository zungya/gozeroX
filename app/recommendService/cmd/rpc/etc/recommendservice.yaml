Name: recommendService-rpc
ListenOn: 0.0.0.0:2005
Mode: dev

#Monitoring
Prometheus:
  Host: 0.0.0.0
  Port: 4012
  Path: /metrics

# Python 推荐服务地址
PythonRecommend:
  RecallUrl: "http://127.0.0.1:2006/api/v1/recall"

# contentService RPC
ContentServiceRpcConf:
  Endpoints:
    - 127.0.0.1:2002
  NonBlock: true

# Redis 缓存
RedisConf:
  Host: redis:6379
  Type: node
  Pass: mTRT1XBhk9VgWb9n

Log:
  ServiceName: recommendService-rpc
  Mode: console
  Level: info
  Path: logs
  KeepDays: 7
  StackCooldownMillis: 100
