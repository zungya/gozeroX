Name: interact-mq
Mode: dev

# PostgreSQL
DB:
  DataSource: "postgres://postgres:mTRT1XBhk9VgWb9n@postgresql:5432/gozerox_db?sslmode=disable"

# Redis（model 层 cache 依赖）
Redis:
  Host: redis:6379
  Pass: mTRT1XBhk9VgWb9n
  Type: node

Cache:
  - Host: redis:6379
    Pass: mTRT1XBhk9VgWb9n

# Kafka 消费者配置
Kafka:
  Brokers:
    - kafka:9092
  CommentTopic: comment_create
  LikeTweetTopic: like_tweet
  LikeCommentTopic: like_comment
  Group: interact-mq

# Prometheus
Prometheus:
  Host: 0.0.0.0
  Port: 4007
  Path: /metrics

# ContentService RPC
ContentServiceRpcConf:
  Endpoints:
    - contentService-rpc:2002
  NonBlock: true