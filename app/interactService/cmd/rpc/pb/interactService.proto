syntax = "proto3";

package pb;

option go_package = "./pb";

// ==================== 基础消息 ====================

message PageReq {
  int64 page = 1;
  int64 pageSize = 2;
}

message PageResp {
  int64 total = 1;
  int64 page = 2;
  int64 pageSize = 3;
}

// ==================== 评论相关 ====================

// 评论基础信息
message CommentInfo {
  int64 cid = 1;
  int64 tid = 2;
  int64 uid = 3;
  int64 parentId = 4;
  int64 rootId = 5;
  string content = 6;
  int64 likeCount = 7;      // 点赞总数
  int64 replyCount = 8;     // 回复总数
  int32 status = 9;         // 0-正常 1-删除 2-审核中
  string createTime = 10;
}

// 创建评论
message CreateCommentReq {
  int64 tid = 1;
  int64 uid = 2;
  string content = 3;
  int64 parentId = 4;       // 0表示顶级评论
}

message CreateCommentResp {
  CommentInfo comment = 1;
}

// 删除评论
message DeleteCommentReq {
  int64 cid = 1;
  int64 uid = 2;            // 操作用户ID，用于权限校验
}

message DeleteCommentResp {
  bool success = 1;         // 是否删除成功
  int64 cid = 2;            // 被删除的评论ID
}

// 获取评论列表
message GetCommentsReq {
  int64 tid = 1;
  int64 page = 2;
  int64 pageSize = 3;
  string sort = 4;          // hot-热门 new-最新
}

message GetCommentsResp {
  repeated CommentInfo comments = 1;
  int64 total = 2;
}

// 获取评论回复列表
message GetRepliesReq {
  int64 cid = 1;            // 父评论ID
  int64 page = 2;
  int64 pageSize = 3;
}

message GetRepliesResp {
  repeated CommentInfo replies = 1;
  int64 total = 2;
}

// ==================== 点赞相关 ====================

// 点赞记录信息（内部使用）
message LikeInfo {
  int64 likesId = 1;
  int64 uid = 2;
  int32 targetType = 3;     // 1-内容 2-评论
  int64 targetId = 4;
  int32 status = 5;         // 1-点赞 0-取消
  string createTime = 6;
  string updateTime = 7;
}

// 点赞/取消点赞
message LikeReq {
  int64 uid = 1;
  int32 targetType = 2;
  int64 targetId = 3;
  int32 action = 4;         // 1-点赞 0-取消
}

message LikeResp {
  bool isLiked = 1;         // 当前是否点赞（操作后的状态）
}

// 获取单个点赞状态
message GetLikeStatusReq {
  int64 uid = 1;
  int32 targetType = 2;
  int64 targetId = 3;
}

message GetLikeStatusResp {
  bool isLiked = 1;         // 只返回是否点赞，likeCount从资源本身获取
}

// 批量获取点赞状态
message BatchGetLikeStatusReq {
  int64 uid = 1;
  int32 targetType = 2;
  repeated int64 targetIds = 3;
}

message BatchGetLikeStatusResp {
  map<int64, bool> isLiked = 1;  // targetId -> isLiked
}

// ==================== RPC Service ====================

service Interaction {
  // 评论服务
  rpc CreateComment(CreateCommentReq) returns (CreateCommentResp);
  rpc DeleteComment(DeleteCommentReq) returns (DeleteCommentResp);
  rpc GetComments(GetCommentsReq) returns (GetCommentsResp);
  rpc GetReplies(GetRepliesReq) returns (GetRepliesResp);

  // 点赞服务
  rpc Like(LikeReq) returns (LikeResp);
  rpc GetLikeStatus(GetLikeStatusReq) returns (GetLikeStatusResp);
  rpc BatchGetLikeStatus(BatchGetLikeStatusReq) returns (BatchGetLikeStatusResp);

}