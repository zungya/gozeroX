syntax = "proto3";

package pb;

option go_package = "./pb";

// ==================== 评论相关 ====================

// 评论基础信息
message CommentInfo {
  int64 snow_cid = 1;       // 评论ID，使用雪花算法生成，保证全局唯一且有序，方便分页查询
  int64 snow_tid = 2;       // 评论所属推文ID
  int64 uid = 3;            // 评论用户ID
  int64 parentId = 4;       // 0表示顶级评论，否则为回复对象的snow_cid
  int64 rootId = 5;         // 顶级评论ID，方便查询一个评论树下的所有评论。顶级评论的rootId等于自己的snow_cid，回复评论的rootId等于它所在的顶级评论的snow_cid。
  string content = 6;       // 评论内容
  int64 likeCount = 7;      // 点赞总数
  int64 replyCount = 8;     // 回复总数
  int64 createTime = 9;     // 评论创建时间，毫秒级时间戳

  // 以下字段不存储在数据库中，而是通过关联查询获取的额外信息
  string nickname = 10;     // 评论用户昵称
  string avatar = 11;       // 评论用户头像
}

// 创建评论
message CreateCommentReq {
  int64 snow_tid = 1;
  int64 uid = 2;
  string content = 3;
  int64 parentId = 4;       // 0表示顶级评论,否则为回复对象的snow_cid。
  int64 rootId = 5;         // 顶级评论ID，如果parentId!=0,说明是回复评论，那么这个rootId应该已经是为它所在的顶级评论的snow_cid，否则是0，代表根评论
  // 业务逻辑：如果parentId=0，说明是顶级评论，那么rootId也应该设置为0；如果parentId不为0，说明是回复评论，那么此处rootId就是根评论id，将这个rootId设置到新评论的rootId字段中。这样就能保证同一评论树下的所有评论都有相同的rootId，方便后续查询整个评论树。
}

message CreateCommentResp {
  int64 code = 1;
  string msg = 2;
  CommentInfo comment = 3;
}

// 删除评论
message DeleteCommentReq {
  int64 snow_cid = 1;
  int64 uid = 2;    // 删除评论的用户ID，后端需要校验这个用户是否有权限删除这条评论（只能删除自己的评论或者管理员可以删除任何评论）
}

message DeleteCommentResp {
  int64 code = 1;
  string msg = 2;
  bool success = 3;
}

// 获取评论列表
message GetCommentsReq {
  int64 snow_tid = 1;
  int64 cursor = 2;        // 上次请求最后一条评论的createtime或者是likecount或者是综合加权对应的值，第一次请求可以不传或者传0
  int64 limit = 3;        // 需要评论数量
  int64 sort = 4;         // 0-按综合排序加权，1-按createTime倒序排序（最新的）
}

message GetCommentsResp {
  int64 code = 1;
  string msg = 2;
  repeated CommentInfo comments = 3;
  int64 total = 4;
}

// 获取评论回复列表
message GetRepliesReq {
  int64 root_cid = 1;            // 根评论的snow_cid
  int64 cursor = 2;               // 上次请求最后一条评论的createtime对应的值
  int64 limit = 3;               // 需要评论数量
}

message GetRepliesResp {
  int64 code = 1;
  string msg = 2;
  repeated CommentInfo replies = 3;
  int64 total = 4;
}

// ==================== 点赞相关 ====================

// 点赞记录信息
message LikeTweetInfo {
  int64 snow_likes_id = 1;
  int64 uid = 2;
  int64 snow_tid = 3;
  int64 status = 4;   // 1-点赞 0-取消
  int64 updateTime = 5;
}

message LikeCommentInfo {
  int64 snow_likes_id = 1;
  int64 uid = 2;
  int64 snow_cid = 3;
  int64 status = 4;   // 1-点赞 0-取消
  int64 updateTime = 5;
}

// 点赞/取消点赞
message LikeTweetReq {
  int64 is_created = 1;       // 0-第一次操作（创建），1-非第一次（更新）
  int64 snow_likes_id = 2;   // 第一次操作时为空，更新时为之前创建的点赞记录ID
  int64 uid = 3;
  int64 snow_tid = 4;
  int64 status = 5;           // 1-点赞 0-取消
  int64 updateTime = 6;       // 操作时间（毫秒级时间戳）
}

message LikeCommentReq {
  int64 is_created = 1;
  int64 snow_likes_id = 2;
  int64 uid = 3;
  int64 snow_cid = 4;
  int64 status = 5;
  int64 updateTime = 6;
}

message LikeTweetResp {
  int64 code = 1;
  string msg = 2;
  LikeTweetInfo like = 3;
}

message LikeCommentResp {
  int64 code = 1;
  string msg = 2;
  LikeCommentInfo like = 3;
}

// ==================== 获取用户所有点赞关系 ====================

// 用户推文点赞关系（用于前端本地存储）
message UserTweetLike {
  int64 snow_tid = 1;        // 推文ID
  int64 snow_likes_id = 2;   // 点赞记录ID
  int64 status = 3;          // 1-已点赞，0-已取消
}

// 用户评论点赞关系（用于前端本地存储）
message UserCommentLike {
  int64 snow_cid = 1;        // 评论ID
  int64 snow_likes_id = 2;   // 点赞记录ID
  int64 status = 3;          // 1-已点赞，0-已取消
}

// 获取用户所有点赞关系（登录时调用，前端存储到本地）
message GetUserAllLikesReq {
  int64 uid = 1;
  int64 cursor = 2;          //返回updateTime在此时间后面的所有点赞关系
}

message GetUserAllLikesResp {
  int64 code = 1;
  string msg = 2;
  repeated UserTweetLike tweet_likes = 3;     // 用户所有推文点赞关系
  repeated UserCommentLike comment_likes = 4;  // 用户所有评论点赞关系
}

// ==================== RPC Service ====================

service Interaction {
  // 评论服务
  rpc CreateComment(CreateCommentReq) returns (CreateCommentResp);
  rpc DeleteComment(DeleteCommentReq) returns (DeleteCommentResp);
  rpc GetComments(GetCommentsReq) returns (GetCommentsResp);
  rpc GetReplies(GetRepliesReq) returns (GetRepliesResp);

  // 点赞/取消点赞
  rpc LikeTweet(LikeTweetReq) returns (LikeTweetResp);
  rpc LikeComment(LikeCommentReq) returns (LikeCommentResp);

  // 获取用户所有点赞关系（登录时调用）
  rpc GetUserAllLikes(GetUserAllLikesReq) returns (GetUserAllLikesResp);
}