syntax = "proto3";

option go_package = "./pb";

package pb;
// ==================== 通用响应结构 ====================
message JwtToken {
  string accessToken = 1;
  int64 accessExpire = 2;   // 过期时间戳
}

// ==================== 用户信息 ====================
message UserInfo {
  int64 uid = 1;
  string nickname = 2;
  string avatar = 3;
  string bio = 4;
  int64 follow_count = 5;
  int64 fans_count = 6;
  int64 post_count = 7;
}

message UserBrief {      //互动微服务返回使用
  int64 uid = 1;
  string nickname = 2;
  string avatar = 3;
}

// ==================== 注册登录 ====================
message RegisterReq {
  string mobile = 1;
  string password = 2;
}

message RegisterResp {
  int64 code = 1;
  string msg = 2;
  UserInfo user_info = 3;
  JwtToken token = 4;  // 注册后直接登录，返回token
}

message LoginReq {
  string mobile = 1;
  string password = 2;
}

message LoginResp {
  int64 code = 1;
  string msg = 2;
  UserInfo user_info = 3;
  JwtToken token = 4;  // 登录成功返回token
}

// ==================== 用户信息查询 ====================
message GetUserInfoReq {
  int64 uid = 1;
}

message GetUserInfoResp {
  int64 code = 1;
  string msg = 2;
  UserInfo user_info = 3;
}

// ==========批量查询（给其它微服务返回评论区） ============
message BatchUserBriefReq {
  repeated int64 uids = 1;
}

message BatchUserBriefResp {
  int64 code = 1;
  string msg = 2;
  repeated UserBrief users = 3;
}


// ==================== 服务定义 ====================
service UserCenter {
  // 用户注册（返回token）
  rpc Register(RegisterReq) returns (RegisterResp);

  // 用户登录（返回user_info + token）
  rpc Login(LoginReq) returns (LoginResp);

  // 获取用户信息
  rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);

  // 批量获取用户简要信息（给互动微服务的）
  rpc BatchGetUserBrief(BatchUserBriefReq) returns (BatchUserBriefResp);

}

