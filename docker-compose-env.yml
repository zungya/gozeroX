######## 项目依赖的环境，启动项目之前要先启动此环境 #######
######## The environment that the project depends on, starting this environment before starting the project #######

services:
  #prometheus监控 — Prometheus for monitoring
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    environment:
      # 时区上海 - Time zone Shanghai (Change if needed)
      TZ: Asia/Shanghai
    volumes:
      - ./deploy/prometheus/server/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: always
    user: root
    ports:
      - 9090:9090
    networks:
      - gozeroX_net

  #查看prometheus监控数据 - Grafana to view Prometheus monitoring data
  grafana:
    image: grafana/grafana:12.3.2
    container_name: grafana
    hostname: grafana
    user: root
    environment:
      # 时区上海 - Time zone Shanghai (Change if needed)
      TZ: Asia/Shanghai
    restart: always
    volumes:
        - ./data/grafana/data:/var/lib/grafana
    ports:
        - "3001:3000"
    networks:
        - gozeroX_net



  #消息队列 - Message queue
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - 9092:9092  # 容器内部之间使用的监听端口
      - 9094:9094  # 容器外部访问监听端口
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 外部访问监听端口为 9092，容器内部使用不同的端口 9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://localhost:9093,PLAINTEXT_CONTAINER://kafka:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094,PLAINTEXT_CONTAINER://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_CONTAINER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - ./data/kafka/data:/var/lib/kafka/data
    # 启动 Kafka 后自动创建 topics
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /etc/kafka/docker/run &
        KAFKA_PID=$!
        for i in $$(seq 1 60); do
          if /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list > /dev/null 2>&1; then
            echo "Kafka 就绪，开始创建 Topics..."
            break
          fi
          sleep 1
        done
        for topic in comment_create like_tweet like_comment notice recommend_tweet recommend_interaction comment_status_sync; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
            --create --if-not-exists --topic $$topic --partitions 3 --replication-factor 1 2>/dev/null
        done
        echo "Kafka Topics 创建完成"
        wait $$KAFKA_PID
    networks:
      - gozeroX_net


  #redis容器 - Redis container
  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - 36379:6379
    environment:
      # 时区上海 - Time zone Shanghai (Change if needed)
      TZ: Asia/Shanghai
    volumes:
      # 数据文件 - data files
      - ./data/redis/data:/data:rw
    command: "redis-server --requirepass mTRT1XBhk9VgWb9n --appendonly yes"
    privileged: true
    restart: always
    networks:
      - gozeroX_net

  postgresql:
    image: postgres:17-alpine
    container_name: postgresql
    environment:
      TZ: Asia/Shanghai
      POSTGRES_PASSWORD: mTRT1XBhk9VgWb9n
      POSTGRES_DB: gozerox_db
      POSTGRES_USER: postgres
    ports:
      - 54329:5432
    volumes:
      - ./data/postgresql/data:/var/lib/postgresql/data:rw          # 持久化数据
      - ./deploy/script/postgre/init:/docker-entrypoint-initdb.d:ro        # ✅ init 脚本
    restart: always
    networks:
      - gozeroX_net


networks:
  gozeroX_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/16

