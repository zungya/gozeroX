######## app下api+rpc ,  Before starting this project, start the environment that the project depends on docker-compose-env.yml #######

services:
  #前端网关nginx-gateay
  nginx-gateway:
    image: nginx:1.28.0
    container_name: nginx-gateway
    restart: always
    privileged: true
    environment:
      - TZ=Asia/Shanghai
    ports:
      - 8888:8081
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d
      - ./data/nginx/log:/var/log/nginx
    networks:
      - gozeroX_net
    depends_on:
      - gozeroX

  #前端api + 业务rpc ,gomodd热加载
  gozeroX:
    image: lyumikael/gomodd:v1.22.1
    container_name: gozeroX
    environment:
      # 时区上海 - Timezone Shanghai
      TZ: Asia/Shanghai
      GOPROXY: https://goproxy.cn,direct
    working_dir: /go/gozeroX
    volumes:
      - .:/go/gozeroX
    privileged: true
    restart: always
    networks:
      - gozeroX_net

networks:
  gozeroX_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

