apiVersion: v1
kind: ConfigMap
metadata:
  name: noticeservice-mq-config
  namespace: gozerox
data:
  service.yaml: |
    Name: notice-mq
    Mode: dev

    Prometheus:
      Host: 0.0.0.0
      Port: 4010
      Path: /metrics

    DB:
      DataSource: postgres://postgres:mTRT1XBhk9VgWb9n@postgresql:5432/gozerox_db?sslmode=disable

    Redis:
      Host: redis:6379
      Pass: mTRT1XBhk9VgWb9n
      Type: node

    Cache:
      - Host: redis:6379
        Pass: mTRT1XBhk9VgWb9n
        Type: node

    Kafka:
      Brokers:
        - kafka:9092
      NoticeTopic: notice
      Group: notice-mq
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noticeservice-mq
  namespace: gozerox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noticeservice-mq
  template:
    metadata:
      labels:
        app: noticeservice-mq
    spec:
      containers:
      - name: noticeservice-mq
        image: gozerox/noticeservice-mq:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4010
        volumeMounts:
        - name: config
          mountPath: /app/etc
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: noticeservice-mq-config
---
apiVersion: v1
kind: Service
metadata:
  name: noticeservice-mq
  namespace: gozerox
spec:
  selector:
    app: noticeservice-mq
  ports:
  - name: metrics
    port: 4010
    targetPort: 4010
