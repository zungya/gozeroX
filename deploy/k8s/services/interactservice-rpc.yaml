apiVersion: v1
kind: ConfigMap
metadata:
  name: interactservice-rpc-config
  namespace: gozerox
data:
  service.yaml: |
    Name: interactService-rpc
    ListenOn: 0.0.0.0:2003
    Mode: dev

    Prometheus:
      Host: 0.0.0.0
      Port: 4006
      Path: /metrics

    RedisConf:
      Host: redis:6379
      Pass: mTRT1XBhk9VgWb9n
      Type: node

    DB:
      DataSource: postgres://postgres:mTRT1XBhk9VgWb9n@postgresql:5432/gozerox_db?sslmode=disable

    Cache:
      - Host: redis:6379
        Pass: mTRT1XBhk9VgWb9n
        Type: node

    UserCenterRpcConf:
      Endpoints:
        - usercenter-rpc:2001
      NonBlock: true

    ContentServiceRpcConf:
      Endpoints:
        - contentservice-rpc:2002
      NonBlock: true

    Kafka:
      Addrs:
        - kafka-0.kafka.gozerox.svc.cluster.local:9092

    Log:
      ServiceName: interactService-rpc
      Mode: console
      Level: info
      Path: logs
      KeepDays: 7
      StackCooldownMillis: 100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interactservice-rpc
  namespace: gozerox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interactservice-rpc
  template:
    metadata:
      labels:
        app: interactservice-rpc
    spec:
      containers:
      - name: interactservice-rpc
        image: gozerox/interactservice-rpc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 2003
        - containerPort: 4006
        volumeMounts:
        - name: config
          mountPath: /app/etc
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: interactservice-rpc-config
---
apiVersion: v1
kind: Service
metadata:
  name: interactservice-rpc
  namespace: gozerox
spec:
  selector:
    app: interactservice-rpc
  ports:
  - name: grpc
    port: 2003
    targetPort: 2003
  - name: metrics
    port: 4006
    targetPort: 4006
