apiVersion: v1
kind: ConfigMap
metadata:
  name: usercenter-rpc-config
  namespace: gozerox
data:
  service.yaml: |
    Name: usercenter-rpc
    ListenOn: 0.0.0.0:2001
    Mode: dev

    Prometheus:
      Host: 0.0.0.0
      Port: 4002
      Path: /metrics

    RedisConf:
      Host: redis:6379
      Pass: mTRT1XBhk9VgWb9n
      Type: node

    DB:
      DataSource: postgres://postgres:mTRT1XBhk9VgWb9n@postgresql:5432/gozerox_db?sslmode=disable

    Cache:
      - Host: redis:6379
        Pass: mTRT1XBhk9VgWb9n
        Type: node

    Log:
      ServiceName: usercenter-rpc
      Mode: console
      Level: info
      Path: logs
      KeepDays: 7
      StackCooldownMillis: 100

    Jwt:
      AccessSecret: a7f3d9c1e5b8290f4a6e8d2c7b5a3f9e1
      AccessExpire: 86400
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usercenter-rpc
  namespace: gozerox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usercenter-rpc
  template:
    metadata:
      labels:
        app: usercenter-rpc
    spec:
      containers:
      - name: usercenter-rpc
        image: gozerox/usercenter-rpc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 2001
        - containerPort: 4002
        volumeMounts:
        - name: config
          mountPath: /app/etc
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: usercenter-rpc-config
---
apiVersion: v1
kind: Service
metadata:
  name: usercenter-rpc
  namespace: gozerox
spec:
  selector:
    app: usercenter-rpc
  ports:
  - name: grpc
    port: 2001
    targetPort: 2001
  - name: metrics
    port: 4002
    targetPort: 4002
