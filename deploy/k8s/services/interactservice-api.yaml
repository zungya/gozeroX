apiVersion: v1
kind: ConfigMap
metadata:
  name: interactservice-api-config
  namespace: gozerox
data:
  service.yaml: |
    Name: interactService-api
    Host: 0.0.0.0
    Port: 1003
    Mode: dev

    Prometheus:
      Host: 0.0.0.0
      Port: 4005
      Path: /metrics

    Log:
      ServiceName: interactService-api
      Mode: console
      Level: info
      Path: logs
      KeepDays: 7
      StackCooldownMillis: 100

    InteractServiceRpcConf:
      Endpoints:
        - interactservice-rpc:2003
      NonBlock: true

    JwtAuth:
      AccessSecret: a7f3d9c1e5b8290f4a6e8d2c7b5a3f9e1
      AccessExpire: 86400
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interactservice-api
  namespace: gozerox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interactservice-api
  template:
    metadata:
      labels:
        app: interactservice-api
    spec:
      containers:
      - name: interactservice-api
        image: gozerox/interactservice-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1003
        - containerPort: 4005
        volumeMounts:
        - name: config
          mountPath: /app/etc
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: interactservice-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: interactservice-api
  namespace: gozerox
spec:
  selector:
    app: interactservice-api
  ports:
  - name: http
    port: 1003
    targetPort: 1003
  - name: metrics
    port: 4005
    targetPort: 4005
