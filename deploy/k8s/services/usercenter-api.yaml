apiVersion: v1
kind: ConfigMap
metadata:
  name: usercenter-api-config
  namespace: gozerox
data:
  service.yaml: |
    Name: usercenter-api
    Host: 0.0.0.0
    Port: 1001
    Mode: dev

    Prometheus:
      Host: 0.0.0.0
      Port: 4001
      Path: /metrics

    JwtAuth:
      AccessSecret: a7f3d9c1e5b8290f4a6e8d2c7b5a3f9e1
      AccessExpire: 86400

    Log:
      ServiceName: usercenter-api
      Mode: console
      Level: info
      Path: logs
      KeepDays: 7
      StackCooldownMillis: 100

    UserCenterRpcConf:
      Endpoints:
        - usercenter-rpc:2001
      NonBlock: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usercenter-api
  namespace: gozerox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usercenter-api
  template:
    metadata:
      labels:
        app: usercenter-api
    spec:
      containers:
      - name: usercenter-api
        image: gozerox/usercenter-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1001
        - containerPort: 4001
        volumeMounts:
        - name: config
          mountPath: /app/etc
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: usercenter-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: usercenter-api
  namespace: gozerox
spec:
  selector:
    app: usercenter-api
  ports:
  - name: http
    port: 1001
    targetPort: 1001
  - name: metrics
    port: 4001
    targetPort: 4001
