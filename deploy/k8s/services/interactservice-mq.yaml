apiVersion: v1
kind: ConfigMap
metadata:
  name: interactservice-mq-config
  namespace: gozerox
data:
  service.yaml: |
    Name: interact-mq
    Mode: dev

    Prometheus:
      Host: 0.0.0.0
      Port: 4007
      Path: /metrics

    DB:
      DataSource: postgres://postgres:mTRT1XBhk9VgWb9n@postgresql:5432/gozerox_db?sslmode=disable

    Redis:
      Host: redis:6379
      Pass: mTRT1XBhk9VgWb9n
      Type: node

    Cache:
      - Host: redis:6379
        Pass: mTRT1XBhk9VgWb9n
        Type: node

    Kafka:
      Brokers:
        - kafka:9092
      CommentTopic: comment_create
      LikeTweetTopic: like_tweet
      LikeCommentTopic: like_comment
      Group: interact-mq

    Log:
      ServiceName: interactService-mq
      Mode: console
      Level: info
      Path: logs
      KeepDays: 7
      StackCooldownMillis: 100

    ContentServiceRpcConf:
      Endpoints:
        - contentservice-rpc:2002
      NonBlock: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interactservice-mq
  namespace: gozerox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interactservice-mq
  template:
    metadata:
      labels:
        app: interactservice-mq
    spec:
      containers:
      - name: interactservice-mq
        image: gozerox/interactservice-mq:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4007
        volumeMounts:
        - name: config
          mountPath: /app/etc
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: interactservice-mq-config
---
apiVersion: v1
kind: Service
metadata:
  name: interactservice-mq
  namespace: gozerox
spec:
  selector:
    app: interactservice-mq
  ports:
  - name: metrics
    port: 4007
    targetPort: 4007
