apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: gozerox
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
        # 日志格式
        log_format main '$remote_addr - $request_method $request_uri '
                        '$status $body_bytes_sent '
                        'upstream: $upstream_addr';

        access_log /var/log/nginx/access.log main;
        error_log  /var/log/nginx/error.log warn;

        # 公共 proxy 配置
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        server {
            listen 80;
            server_name _;

            # ============ 用户模块 ============
            # /api/user/login → usercenter-api:1001/usercenter/v1/user/login
            location /api/user/ {
                proxy_pass http://usercenter-api.gozerox.svc.cluster.local:1001/usercenter/v1/user/;
            }

            # ============ 推文模块 ============
            # /api/tweet/createTweet → contentservice-api:1002/contentService/v1/createTweet
            location /api/tweet/ {
                proxy_pass http://contentservice-api.gozerox.svc.cluster.local:1002/contentService/v1/;
            }

            # ============ 互动模块 ============
            # /api/interact/like → interactservice-api:1003/interactService/v1/like
            location /api/interact/ {
                proxy_pass http://interactservice-api.gozerox.svc.cluster.local:1003/interactService/v1/;
            }

            # ============ 通知模块 ============
            # /api/notice/getNotices → noticeservice-api:1004/noticeService/v1/getNotices
            location /api/notice/ {
                proxy_pass http://noticeservice-api.gozerox.svc.cluster.local:1004/noticeService/v1/;
            }

            # ============ 推荐模块 ============
            # /api/recommend/feed → recommendservice-api:1005/recommendService/v1/feed
            location /api/recommend/ {
                proxy_pass http://recommendservice-api.gozerox.svc.cluster.local:1005/recommendService/v1/;
            }

            # 健康检查
            location /health {
                access_log off;
                return 200 "ok";
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: gozerox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: nginx-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: gozerox
spec:
  type: NodePort
  selector:
    app: nginx-gateway
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30081